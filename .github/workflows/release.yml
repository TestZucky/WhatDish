name: Release

# Cut a release by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
# This creates a GitHub Release with auto-generated notes from merged PRs/commits.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so release notes can be generated
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
